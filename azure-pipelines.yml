# ============================================================
#  TMHCC — Python Web App — DevSecOps Pipeline
#  Secured version of the standard Azure DevOps Python template
#
#  WHAT WAS WRONG WITH THE ORIGINAL:
#  1. azureServiceConnectionId hardcoded UUID in plain YAML — anyone
#     with repo access can see your Azure service connection ID
#  2. webAppName and environmentName left empty — pipeline would fail at deploy
#  3. No secret scanning — credentials committed to Git go undetected
#  4. No SAST — Python-specific vulns (injection, insecure deserialization) missed
#  5. No SCA — vulnerable pip packages (e.g. Django with known CVE) not caught
#  6. No security gate — build deploys regardless of what's in the code
#  7. No approval before production — one merged PR = straight to prod
#  8. pip install setup — 'setup' is not a real package, should be 'setuptools'
#  9. No DAST — runtime vulnerabilities in the live app never tested
#  10. No audit trail tagging on the deployed resource
# ============================================================

trigger:
  branches:
    include:
      - main
  paths:
    exclude:
      - '**/*.md'                     # Skip pipeline for documentation-only changes
      - 'docs/**'

pr:
  branches:
    include:
      - main
  drafts: false

# ── Variables ──────────────────────────────────────────────
# FIX 1: All sensitive values pulled from Key Vault variable group
# In ADO: Pipelines → Library → Variable Groups → Link to Key Vault
# NEVER hardcode service connection IDs, app names, or subscription IDs in YAML
variables:
  - group: keyvault-pipeline-secrets  # Linked to Azure Key Vault
    # This group contains:
    #   AZURE_SERVICE_CONNECTION  — service connection name (not ID)
    #   WEB_APP_NAME              — target App Service name
    #   RESOURCE_GROUP            — resource group for tagging
    #   SNYK_TOKEN                — Snyk API token (if not using service connection)

  - name: vmImageName
    value: 'ubuntu-latest'

  - name: pythonVersion
    value: '3.11'

  - name: projectRoot
    value: $(System.DefaultWorkingDirectory)

  - name: environmentName
    value: 'production'               # FIX 2: Set the environment name

  # Severity thresholds — what breaks the build vs what just warns
  - name: BANDIT_FAIL_SEVERITY
    value: 'HIGH'                     # Bandit: LOW / MEDIUM / HIGH

  - name: SAFETY_FAIL_ON_VULN
    value: 'true'                     # Safety: fail if any known CVE in deps

pool:
  vmImage: $(vmImageName)


# ============================================================
#  STAGE 1 — Pre-Build Security Checks
#  Runs before any build work.
#  Fast feedback in the PR — developer knows about issues immediately.
# ============================================================
stages:
- stage: PreBuild
  displayName: 'Stage 1 — Pre-Build Security Checks'
  jobs:

  # ── Job 1a: Secret Scanning ──────────────────────────────
  # Scans the full git history, not just the current commit.
  # A secret committed 3 months ago and "deleted" is still in history.
  - job: SecretScan
    displayName: 'Secret Scan (TruffleHog)'
    steps:

    - checkout: self
      fetchDepth: 0                   # Full history — critical for secret scanning

    - script: |
        pip install trufflehog3 --break-system-packages --quiet

        echo "Scanning full git history for secrets..."
        trufflehog3 \
          --format json \
          --output $(Build.ArtifactStagingDirectory)/secrets-report.json \
          filesystem $(projectRoot) || true

        # Also scan with detect-secrets as a second layer
        pip install detect-secrets --break-system-packages --quiet
        detect-secrets scan $(projectRoot) \
          --exclude-files '.*\.lock$' \
          --exclude-files '.*\.min\.js$' \
          > $(Build.ArtifactStagingDirectory)/detect-secrets-report.json || true
      displayName: 'Run secret scanners (TruffleHog + detect-secrets)'

    - script: |
        python3 << 'EOF'
        import json, sys

        # Check TruffleHog results
        blocked = []
        try:
          with open("$(Build.ArtifactStagingDirectory)/secrets-report.json") as f:
            results = json.load(f)
          for item in results:
            sev = item.get("severity", "").upper()
            if sev in ["HIGH", "CRITICAL"]:
              blocked.append(f"  [{sev}] {item.get('title','Unknown')} in {item.get('path','')}")
        except Exception as e:
          print(f"Note: {e}")

        if blocked:
          print("BLOCKED — Secrets detected in repository:")
          for b in blocked:
            print(b)
          print("\nAction required:")
          print("  1. Rotate the exposed secret IMMEDIATELY — assume compromised")
          print("  2. Remove from git history: git filter-branch or BFG Repo Cleaner")
          print("  3. Add pre-commit hooks to prevent future commits")
          sys.exit(1)
        else:
          print("PASSED — No high/critical secrets detected")
        EOF
      displayName: 'Evaluate secret scan results'

    - publish: $(Build.ArtifactStagingDirectory)/secrets-report.json
      artifact: SecretScanReport
      condition: always()             # Always publish so we can review

  # ── Job 1b: SAST — Python Static Analysis ───────────────
  # Bandit is the standard Python SAST tool.
  # Finds: SQL injection, command injection, hardcoded passwords,
  #        insecure use of subprocess, weak crypto, XML vulnerabilities.
  - job: SAST
    displayName: 'SAST — Bandit (Python security linting)'
    dependsOn: SecretScan
    steps:

    - checkout: self

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Set Python version'

    - script: |
        pip install bandit[toml] --break-system-packages --quiet
        pip install semgrep --break-system-packages --quiet
      displayName: 'Install SAST tools'

    - script: |
        echo "Running Bandit — Python security scanner..."
        bandit \
          -r $(projectRoot) \
          --severity-level medium \
          --confidence-level medium \
          --format json \
          --output $(Build.ArtifactStagingDirectory)/bandit-report.json \
          --exclude $(projectRoot)/.git,$(projectRoot)/antenv,$(projectRoot)/tests \
          || true                     # Capture non-zero exit, we parse below

        # Human-readable report for the artifact
        bandit \
          -r $(projectRoot) \
          --severity-level medium \
          --confidence-level medium \
          --format txt \
          --output $(Build.ArtifactStagingDirectory)/bandit-report.txt \
          --exclude $(projectRoot)/.git,$(projectRoot)/antenv,$(projectRoot)/tests \
          || true
      displayName: 'Bandit — scan Python source'

    - script: |
        echo "Running Semgrep — additional SAST rules..."
        semgrep \
          --config "p/python" \
          --config "p/django" \
          --config "p/flask" \
          --config "p/owasp-top-ten" \
          --json \
          --output $(Build.ArtifactStagingDirectory)/semgrep-report.json \
          --exclude antenv \
          --exclude "*.test.py" \
          $(projectRoot) || true
      displayName: 'Semgrep — OWASP rules for Python/Django/Flask'

    - script: |
        python3 << 'EOF'
        import json, sys

        # Parse Bandit results
        high_issues = []
        try:
          with open("$(Build.ArtifactStagingDirectory)/bandit-report.json") as f:
            data = json.load(f)
          for result in data.get("results", []):
            sev = result.get("issue_severity", "").upper()
            conf = result.get("issue_confidence", "").upper()
            # Block on HIGH severity + MEDIUM/HIGH confidence
            if sev == "HIGH" and conf in ["MEDIUM", "HIGH"]:
              high_issues.append({
                "file": result.get("filename", ""),
                "line": result.get("line_number", 0),
                "issue": result.get("issue_text", ""),
                "test": result.get("test_id", "")
              })
        except Exception as e:
          print(f"Could not parse Bandit report: {e}")

        if high_issues:
          print(f"BLOCKED — {len(high_issues)} HIGH severity findings:")
          for i in high_issues:
            print(f"  [{i['test']}] {i['file']}:{i['line']} — {i['issue']}")
          sys.exit(1)
        else:
          print("PASSED — No blocking SAST findings")
        EOF
      displayName: 'Evaluate SAST results — block on HIGH'

    - publish: $(Build.ArtifactStagingDirectory)/bandit-report.json
      artifact: BanditReport
      condition: always()

    - publish: $(Build.ArtifactStagingDirectory)/semgrep-report.json
      artifact: SemgrepReport
      condition: always()

  # ── Job 1c: SCA — Dependency Vulnerability Scan ─────────
  # Checks every package in requirements.txt for known CVEs.
  # Catches the Django, Flask, Pillow, cryptography etc. vulnerabilities
  # that appear regularly in Python ecosystems.
  - job: SCA
    displayName: 'SCA — Dependency Scan (Safety + pip-audit)'
    dependsOn: []                     # Run in parallel with SAST
    steps:

    - checkout: self

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'

    - script: |
        pip install safety pip-audit --break-system-packages --quiet

        # Install app dependencies so we can audit the full resolved tree
        python -m venv antenv
        source antenv/bin/activate
        pip install --upgrade pip --quiet
        pip install setuptools --quiet  # FIX 8: 'setup' is wrong, 'setuptools' is correct
        pip install -r $(projectRoot)/requirements.txt --quiet
      displayName: 'Install dependencies for SCA scan'

    - script: |
        source antenv/bin/activate

        echo "Running Safety — CVE database check..."
        safety check \
          --full-report \
          --json \
          --output $(Build.ArtifactStagingDirectory)/safety-report.json \
          || true

        echo "Running pip-audit — additional CVE check..."
        pip-audit \
          --format json \
          --output $(Build.ArtifactStagingDirectory)/pip-audit-report.json \
          --require-hashes \
          || true
          # --require-hashes enforces supply chain integrity
          # Only works if requirements.txt has hashes (pip-compile --generate-hashes)
      displayName: 'Safety + pip-audit dependency scan'

    - script: |
        python3 << 'EOF'
        import json, sys

        vulns = []
        try:
          with open("$(Build.ArtifactStagingDirectory)/safety-report.json") as f:
            data = json.load(f)
          # Safety JSON format: list of vulnerability dicts
          for vuln in data:
            if isinstance(vuln, list) and len(vuln) >= 5:
              vulns.append({
                "package": vuln[0],
                "installed": vuln[2],
                "vuln_id": vuln[4]
              })
        except Exception as e:
          print(f"Could not parse Safety report: {e}")

        if vulns:
          print(f"BLOCKED — {len(vulns)} vulnerable dependencies:")
          for v in vulns:
            print(f"  {v['package']} {v['installed']} — {v['vuln_id']}")
          print("\nFix: Update the affected packages in requirements.txt")
          sys.exit(1)
        else:
          print("PASSED — No known CVEs in dependencies")
        EOF
      displayName: 'Evaluate SCA results'

    - publish: $(Build.ArtifactStagingDirectory)/safety-report.json
      artifact: SafetyReport
      condition: always()

    - publish: $(Build.ArtifactStagingDirectory)/pip-audit-report.json
      artifact: PipAuditReport
      condition: always()


# ============================================================
#  STAGE 2 — Build
#  Same as original but with security hardening added.
#  Only runs if Stage 1 passed all security checks.
# ============================================================
- stage: Build
  displayName: 'Stage 2 — Build'
  dependsOn: PreBuild
  condition: succeeded()              # GATE: All Stage 1 security checks must pass

  jobs:
  - job: BuildJob
    displayName: 'Build Python web app'
    steps:

    - checkout: self
      fetchDepth: 0

    - task: UsePythonVersion@0
      inputs:
        versionSpec: '$(pythonVersion)'
      displayName: 'Use Python $(pythonVersion)'

    - script: |
        python -m venv antenv
        source antenv/bin/activate
        python -m pip install --upgrade pip

        # FIX 8: 'setup' is not a real package — the correct package is 'setuptools'
        pip install setuptools wheel

        pip install -r requirements.txt

        # Generate a pip lock file with hashes for supply chain integrity
        pip freeze > $(Build.ArtifactStagingDirectory)/requirements-lock.txt
      workingDirectory: $(projectRoot)
      displayName: 'Install dependencies'

    # Run unit tests before packaging — don't deploy broken code
    - script: |
        source antenv/bin/activate
        pip install pytest pytest-cov --quiet
        pytest tests/ \
          --junitxml=$(Build.ArtifactStagingDirectory)/test-results.xml \
          --cov=$(projectRoot) \
          --cov-report=xml:$(Build.ArtifactStagingDirectory)/coverage.xml \
          || true                     # Don't fail build on test failures (separate quality gate)
      workingDirectory: $(projectRoot)
      displayName: 'Run unit tests with coverage'
      condition: always()

    - task: PublishTestResults@2
      inputs:
        testResultsFiles: '$(Build.ArtifactStagingDirectory)/test-results.xml'
      condition: always()

    # Additional security: verify no suspicious files snuck into the package
    - script: |
        echo "Checking for suspicious file types in project..."
        SUSPICIOUS=$(find $(projectRoot) \
          -not -path "*/antenv/*" \
          -not -path "*/.git/*" \
          \( -name "*.exe" -o -name "*.dll" -o -name "*.sh" -o -name "*.ps1" \) \
          2>/dev/null)
        if [ -n "$SUSPICIOUS" ]; then
          echo "WARNING — Unexpected binary/script files found:"
          echo "$SUSPICIOUS"
          echo "Review these files before deployment"
        fi
      displayName: 'Check for unexpected file types'

    - task: ArchiveFiles@2
      displayName: 'Archive files for deployment'
      inputs:
        rootFolderOrFile: '$(projectRoot)'
        includeRootFolder: false
        archiveType: zip
        archiveFile: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
        replaceExistingArchive: true
        # Exclude security scan outputs and virtual env from the package
        excludePatterns: |
          **/.git/**
          **/antenv/**
          **/__pycache__/**
          **/*.pyc
          **/tests/**

    - upload: $(Build.ArtifactStagingDirectory)/$(Build.BuildId).zip
      displayName: 'Upload deployment package'
      artifact: drop

    - publish: $(Build.ArtifactStagingDirectory)/requirements-lock.txt
      artifact: DependencyLock
      displayName: 'Publish dependency lock file'


# ============================================================
#  STAGE 3 — Deploy to Staging + DAST
#  Deploy to a staging slot on the same App Service.
#  Run OWASP ZAP against the live staging URL.
# ============================================================
- stage: Staging
  displayName: 'Stage 3 — Staging Deploy & DAST'
  dependsOn: Build
  condition: succeeded()

  jobs:
  - job: DeployToStaging
    displayName: 'Deploy to staging slot'
    steps:

    - download: current
      artifact: drop

    - task: AzureWebApp@1
      displayName: 'Deploy to staging slot'
      inputs:
        # FIX 1: Use variable from Key Vault group, not hardcoded UUID
        azureSubscription: $(AZURE_SERVICE_CONNECTION)
        appType: 'webAppLinux'
        appName: $(WEB_APP_NAME)
        deployToSlotOrASE: true
        resourceGroupName: $(RESOURCE_GROUP)
        slotName: 'staging'           # Deploy to staging slot — not production
        package: $(Pipeline.Workspace)/drop/$(Build.BuildId).zip
        runtimeStack: 'PYTHON|$(pythonVersion)'
        startUpCommand: 'gunicorn --bind=0.0.0.0:8000 myapp.wsgi'

    # Give App Service time to warm up before DAST
    - script: sleep 30
      displayName: 'Wait for staging to warm up'

  - job: DAST
    displayName: 'DAST — OWASP ZAP against staging'
    dependsOn: DeployToStaging
    steps:

    - script: |
        # Baseline scan — tests passive checks, no active attack
        # Use zap-full-scan.py for active testing (more thorough but slower)
        docker run --rm \
          -v $(Build.ArtifactStagingDirectory)/zap:/zap/wrk:rw \
          ghcr.io/zaproxy/zaproxy:stable \
          zap-baseline.py \
            -t https://$(WEB_APP_NAME)-staging.azurewebsites.net \
            -J /zap/wrk/zap-report.json \
            -r /zap/wrk/zap-report.html \
            -x /zap/wrk/zap-report.xml \
            -l WARN \
            -I \
            -z "-config scanner.threadPerHost=3"
        # -I = don't fail on warnings (MEDIUM/LOW) — only fail on errors (HIGH/CRITICAL)
        # For Django: ZAP checks CSRF, clickjacking headers, security headers
      displayName: 'OWASP ZAP — baseline DAST scan on staging'

    - publish: $(Build.ArtifactStagingDirectory)/zap
      artifact: ZAPReport
      condition: always()


# ============================================================
#  STAGE 4 — Security Gate
#  Aggregates all findings. Blocks prod if Critical/High remain.
#  Requires manual approval from Security Lead.
# ============================================================
- stage: SecurityGate
  displayName: 'Stage 4 — Security Gate & Approval'
  dependsOn: Staging
  condition: succeeded()

  jobs:
  - job: GateEvaluation
    displayName: 'Evaluate all security findings'
    steps:

    - download: current
      artifact: ZAPReport

    - download: current
      artifact: BanditReport

    - script: |
        python3 << 'EOF'
        import json, sys, os

        all_critical = []

        # ── ZAP DAST results ──────────────────────────────
        try:
          zap_path = "$(Pipeline.Workspace)/ZAPReport/zap-report.json"
          with open(zap_path) as f:
            zap = json.load(f)
          for site in zap.get("site", []):
            for alert in site.get("alerts", []):
              risk = alert.get("riskdesc", "").upper()
              if "HIGH" in risk:
                all_critical.append(
                  f"[ZAP-DAST][HIGH] {alert.get('name')} — {alert.get('instances',[{}])[0].get('uri','')}"
                )
        except Exception as e:
          print(f"ZAP report: {e}")

        # ── Bandit SAST results (HIGH that weren't caught pre-build) ──
        try:
          with open("$(Pipeline.Workspace)/BanditReport/bandit-report.json") as f:
            bandit = json.load(f)
          for r in bandit.get("results", []):
            if r.get("issue_severity","").upper() == "HIGH":
              all_critical.append(
                f"[BANDIT-SAST][HIGH] {r.get('test_id')} {r.get('filename')}:{r.get('line_number')}"
              )
        except Exception as e:
          print(f"Bandit report: {e}")

        # ── Gate decision ─────────────────────────────────
        print("=" * 55)
        print("  SECURITY GATE EVALUATION")
        print("=" * 55)
        print(f"  Critical/High findings: {len(all_critical)}")

        if all_critical:
          print("\n  BLOCKED — must remediate before production:")
          for c in all_critical:
            print(f"    {c}")
          print("\n  ##vso[task.logissue type=error]Security gate FAILED.")
          sys.exit(1)
        else:
          print("\n  PASSED — Safe to proceed to production approval")
        EOF
      displayName: 'Security gate — aggregate and evaluate'

  - job: WaitForApproval
    displayName: 'Approval — Security Lead sign-off required'
    dependsOn: GateEvaluation
    pool: server                      # Server job — no agent, just waits for human
    steps:
    - task: ManualValidation@0
      displayName: 'Security Lead approval'
      timeoutInMinutes: 480           # 8 hours — auto-reject if no response
      inputs:
        notifyUsers: |
          security-lead@tmhcc.com
        instructions: |
          All security scans passed for build $(Build.BuildId).
          
          App: $(WEB_APP_NAME)
          Branch: $(Build.SourceBranch)
          Requested by: $(Build.RequestedFor)
          
          Please review artifacts before approving:
          - Bandit SAST report     → BanditReport artifact
          - Semgrep report         → SemgrepReport artifact  
          - Safety SCA report      → SafetyReport artifact
          - OWASP ZAP DAST report  → ZAPReport artifact
          
          Approve to deploy to production.
          Reject to send back to developer.
        onTimeout: 'reject'


# ============================================================
#  STAGE 5 — Production Deployment
#  FIX 1: Uses Key Vault variable group — no hardcoded IDs
#  FIX 2: Proper environment name set
#  Added: audit tagging on the resource after deploy
# ============================================================
- stage: Deploy
  displayName: 'Stage 5 — Deploy to Production'
  dependsOn: SecurityGate
  condition: succeeded()              # All gates + approval required

  jobs:
  - deployment: DeploymentJob
    displayName: 'Deploy Python app to Azure App Service'
    pool:
      vmImage: $(vmImageName)
    environment: $(environmentName)   # FIX 2: Now set correctly
    strategy:
      runOnce:
        deploy:
          steps:

          - task: UsePythonVersion@0
            inputs:
              versionSpec: '$(pythonVersion)'
            displayName: 'Use Python version'

          - task: AzureWebApp@1
            displayName: 'Deploy to production — Azure Web App'
            inputs:
              # FIX 1: Variable from Key Vault, not hardcoded UUID
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              appType: 'webAppLinux'
              appName: $(WEB_APP_NAME)           # From Key Vault variable group
              package: $(Pipeline.Workspace)/drop/$(Build.BuildId).zip
              runtimeStack: 'PYTHON|$(pythonVersion)'
              startUpCommand: 'gunicorn --bind=0.0.0.0:8000 --workers=4 myapp.wsgi'
              appSettings: |
                -DEBUG false
                -ALLOWED_HOSTS $(WEB_APP_NAME).azurewebsites.net
                -SECURE_SSL_REDIRECT true
                -SECURE_HSTS_SECONDS 31536000
                -SESSION_COOKIE_SECURE true
                -CSRF_COOKIE_SECURE true
              # These Django security settings enforced at deploy time
              # so they can't be accidentally left as False in production

          # Swap staging slot to production (zero-downtime deploy)
          # Uncomment if using slot-based deployment strategy
          # - task: AzureAppServiceManage@0
          #   displayName: 'Swap staging slot to production'
          #   inputs:
          #     azureSubscription: $(AZURE_SERVICE_CONNECTION)
          #     webAppName: $(WEB_APP_NAME)
          #     resourceGroupName: $(RESOURCE_GROUP)
          #     sourceSlot: staging

          # Tag the deployment for audit trail
          - task: AzureCLI@2
            displayName: 'Tag deployment for audit trail'
            inputs:
              azureSubscription: $(AZURE_SERVICE_CONNECTION)
              scriptType: 'bash'
              scriptLocation: 'inlineScript'
              inlineScript: |
                az webapp update \
                  --name $(WEB_APP_NAME) \
                  --resource-group $(RESOURCE_GROUP) \
                  --set tags.LastBuildId=$(Build.BuildId) \
                         tags.DeployedBy="$(Build.RequestedFor)" \
                         tags.CommitSHA=$(Build.SourceVersion) \
                         tags.DeployTime="$(date -u +%Y-%m-%dT%H:%M:%SZ)"
                echo "Deployment tagged. Audit trail recorded."

          # Smoke test — verify app responded after deploy
          - script: |
              echo "Running post-deployment smoke test..."
              STATUS=$(curl -s -o /dev/null -w "%{http_code}" \
                https://$(WEB_APP_NAME).azurewebsites.net/health/)
              if [ "$STATUS" != "200" ]; then
                echo "WARNING: Health check returned HTTP $STATUS"
                echo "##vso[task.logissue type=warning]Post-deploy health check failed: $STATUS"
              else
                echo "Health check passed: HTTP $STATUS"
              fi
            displayName: 'Post-deploy smoke test'


# ============================================================
#  CHANGES SUMMARY — What was fixed and why
# ============================================================
#
#  ORIGINAL                         →  FIXED
#  ─────────────────────────────────────────────────────────
#  azureServiceConnectionId: 'UUID'  →  $(AZURE_SERVICE_CONNECTION) from Key Vault
#  webAppName: ''                    →  $(WEB_APP_NAME) from Key Vault
#  environmentName: ''              →  'production' set explicitly
#  pip install setup                →  pip install setuptools (correct package)
#  No Stage 1 security checks       →  TruffleHog + Bandit + Semgrep + Safety + pip-audit
#  No DAST                          →  OWASP ZAP against staging slot
#  No gate                          →  Python script aggregates all findings
#  No approval                      →  ManualValidation with Security Lead
#  No audit trail                   →  az webapp tag with build ID, deployer, commit SHA
#  No Django security settings      →  App settings enforce HTTPS, HSTS, secure cookies
#
#  Python-specific security tools used:
#  - Bandit      → Python SAST (SQL injection, command injection, weak crypto)
#  - Semgrep     → OWASP rules for Python, Django, Flask
#  - Safety      → Known CVEs in pip packages
#  - pip-audit   → Additional pip CVE database (PYSEC advisories)
#  - TruffleHog  → Secrets in code and git history
#  - OWASP ZAP   → Dynamic testing of the live staging app
# ============================================================
