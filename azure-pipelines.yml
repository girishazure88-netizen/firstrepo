trigger:
- main

pool:
  vmImage: 'ubuntu-latest' # This uses Microsoft's hardware, not your "Default" pool

steps:
# Step 1: Set up Python
- task: UsePythonVersion@0
  inputs:
    versionSpec: '3.9'
    addToPath: true
  displayName: 'Install Python'

# Step 2: Install the Security Tool (Bandit)
- script: |
    python -m pip install bandit
  displayName: 'Install Bandit Security Scanner'

# Step 3: Run the Scan on your vulnerable_code.py
- script: |
    bandit -r vulnerable_code.py
  displayName: 'Run Security Scan'
  continueOnError: true # This allows the pipeline to finish even if it finds bugs

# Step 4: Run the program
- script: |
    python vulnerable_code.py < /dev/null
  displayName: 'Run Python Program'